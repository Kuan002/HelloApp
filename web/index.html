<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scissors RockPaper Game</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { margin: 10px; padding: 10px 20px; font-size: 18px; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h1>Scissors Rock Paper Game</h1>

<button onclick="play('Scissors')">Scissors </button>
<button onclick="play('Rock')">Rock</button>
<button onclick="play('Paper')">Paper </button>

<div id="result"></div>

<script>
    const choices = ['Scissors', 'Rock', 'Paper'];
    let win = 0, lose = 0, draw = 0;

    function play(userChoice) {
        const computerChoice = choices[Math.floor(Math.random() * 3)];
        let message = `You chose: ${userChoice}，Computer chose: ${computerChoice}。`;

        if (userChoice === computerChoice) {
            message += ' Draw！';
            draw++;
        } else if (
            (userChoice === 'Scissors ' && computerChoice === 'Paper ') ||
            (userChoice === 'Rock' && computerChoice === 'Scissors ') ||
            (userChoice === 'Paper ' && computerChoice === 'Rock')
        ) {
            message += ' You win！';
            win++;
        } else {
            message += ' You lose！';
            lose++;
        }

        message += `<br>Win: ${win} Draw: ${draw} Lose: ${lose}`;
        document.getElementById('result').innerHTML = message;
    }
</script>

</body>
</html>
